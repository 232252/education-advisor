<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1320" />
<title>Education Advisor · 0.0.1.rc1 — 预览</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  /* ===== THEME TOKENS ===== */
  :root,
  :root[data-theme="dark"]{
    --bg-base:#08080f;
    --bg-soft:var(--bg-soft);
    --bg-soft-hover:var(--border);
    --bg-card:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));
    --bg-card-solid:rgba(15,15,26,.78);
    --bg-elevated:var(--border);
    --bg-input:var(--bg-soft);
    --bg-hover:var(--border);
    --border:var(--border);
    --border-soft:var(--border-soft);
    --border-strong:var(--border-strong);
    --text-1:#fff;
    --text-2:var(--text-2);
    --text-3:var(--text-3);
    --text-4:var(--text-4);
    --text-5:var(--text-5);
    --text-6:var(--text-6);
    --text-faint:#4a5070;
    --shadow-card:0 1px 0 var(--bg-soft) inset, 0 8px 24px -8px rgba(0,0,0,.5);
    --shadow-hover:0 16px 40px -12px rgba(0,0,0,.6);
    --scroll-thumb:var(--border);
    --scroll-thumb-hover:var(--border-strong);
    --grid-color:var(--border-soft);
    --bg-glow-1:rgba(99,102,241,.18);
    --bg-glow-2:rgba(236,72,153,.14);
    --bg-glow-3:rgba(6,182,212,.12);
    --bg-glow-4:rgba(168,85,247,.18);
    --brand-logo-bg:#1a1a2e;
    --selection-bg:rgba(168,85,247,.35);
  }
  :root[data-theme="light"]{
    --bg-base:#f4f5fa;
    --bg-soft:rgba(99,102,241,.04);
    --bg-soft-hover:rgba(99,102,241,.08);
    --bg-card:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.85));
    --bg-card-solid:rgba(255,255,255,.85);
    --bg-elevated:rgba(255,255,255,.7);
    --bg-input:rgba(255,255,255,.7);
    --bg-hover:rgba(99,102,241,.1);
    --border:rgba(99,102,241,.12);
    --border-soft:rgba(99,102,241,.07);
    --border-strong:rgba(99,102,241,.2);
    --text-1:#0f172a;
    --text-2:#1e293b;
    --text-3:#334155;
    --text-4:#475569;
    --text-5:#64748b;
    --text-6:#94a3b8;
    --text-faint:#cbd5e1;
    --shadow-card:0 1px 0 rgba(255,255,255,.6) inset, 0 4px 16px -4px rgba(99,102,241,.08), 0 1px 3px rgba(15,23,42,.04);
    --shadow-hover:0 16px 40px -12px rgba(99,102,241,.18);
    --scroll-thumb:rgba(99,102,241,.15);
    --scroll-thumb-hover:rgba(99,102,241,.3);
    --grid-color:rgba(99,102,241,.05);
    --bg-glow-1:rgba(99,102,241,.12);
    --bg-glow-2:rgba(236,72,153,.1);
    --bg-glow-3:rgba(6,182,212,.1);
    --bg-glow-4:rgba(168,85,247,.1);
    --brand-logo-bg:#ffffff;
    --selection-bg:rgba(168,85,247,.25);
  }
  /* follow-system */
  @media (prefers-color-scheme: light) {
    :root[data-theme="auto"] {
      --bg-base:#f4f5fa;
      --bg-soft:rgba(99,102,241,.04);
      --bg-soft-hover:rgba(99,102,241,.08);
      --bg-card:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.85));
      --bg-card-solid:rgba(255,255,255,.85);
      --bg-elevated:rgba(255,255,255,.7);
      --bg-input:rgba(255,255,255,.7);
      --bg-hover:rgba(99,102,241,.1);
      --border:rgba(99,102,241,.12);
      --border-soft:rgba(99,102,241,.07);
      --border-strong:rgba(99,102,241,.2);
      --text-1:#0f172a;
      --text-2:#1e293b;
      --text-3:#334155;
      --text-4:#475569;
      --text-5:#64748b;
      --text-6:#94a3b8;
      --text-faint:#cbd5e1;
      --shadow-card:0 1px 0 rgba(255,255,255,.6) inset, 0 4px 16px -4px rgba(99,102,241,.08), 0 1px 3px rgba(15,23,42,.04);
      --shadow-hover:0 16px 40px -12px rgba(99,102,241,.18);
      --scroll-thumb:rgba(99,102,241,.15);
      --scroll-thumb-hover:rgba(99,102,241,.3);
      --grid-color:rgba(99,102,241,.05);
      --bg-glow-1:rgba(99,102,241,.12);
      --bg-glow-2:rgba(236,72,153,.1);
      --bg-glow-3:rgba(6,182,212,.1);
      --bg-glow-4:rgba(168,85,247,.1);
      --brand-logo-bg:#ffffff;
      --selection-bg:rgba(168,85,247,.25);
    }
  }

  /* ===== Base reset ===== */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Outfit','Noto Sans SC',system-ui,sans-serif;
    font-size:14px;
    color:var(--text-2);
    background:var(--bg-base);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    transition:background .25s ease, color .25s ease;
  }
  button,input,select,textarea{font:inherit;color:inherit}
  button{cursor:pointer;background:none;border:none;padding:0}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--selection-bg);color:#fff}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}

  /* ===== Background canvas (gradient + glow orbs + grid) ===== */
  .app-bg{
    position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:
      radial-gradient(1200px 800px at 12% -8%, var(--bg-glow-1), transparent 60%),
      radial-gradient(900px 700px at 92% 8%, var(--bg-glow-2), transparent 60%),
      radial-gradient(1100px 900px at 50% 110%, var(--bg-glow-3), transparent 60%),
      linear-gradient(180deg, var(--bg-base) 0%, var(--bg-base) 60%, var(--bg-base) 100%);
    transition:background .25s ease;
  }
  .app-bg::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(var(--grid-color) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
  }
  .app-bg::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(600px 200px at 50% 100%, var(--bg-glow-4), transparent 70%);
  }

  /* ===== Layout ===== */
  .app{display:grid;grid-template-columns:248px 1fr;grid-template-rows:64px 1fr;height:100vh}
  .sidebar{grid-row:1/3;border-right:1px solid var(--border);background:var(--bg-card-solid);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:18px 14px;gap:6px;position:relative;z-index:5;transition:background .25s, border-color .25s}
  .topbar{grid-column:2;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border-soft);background:rgba(10,10,20,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;z-index:4;transition:border-color .25s}
  :root[data-theme="light"] .topbar, :root[data-theme="auto"] .topbar {background:rgba(255,255,255,.7)}
  .main{grid-column:2;overflow-y:auto;padding:28px 36px 60px;position:relative;z-index:1}
  .main-inner{max-width:1280px;margin:0 auto}

  /* ===== Brand ===== */
  .brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px;border-bottom:1px solid var(--border-soft);margin-bottom:14px}
  .brand-logo{
    width:34px;height:34px;border-radius:10px;
    background:conic-gradient(from 200deg, #6366f1, #a855f7, #ec4899, #06b6d4, #6366f1);
    position:relative;flex-shrink:0;
    box-shadow:0 0 24px rgba(168,85,247,.45), inset 0 0 0 1px var(--border-strong);
  }
  .brand-logo::after{content:"";position:absolute;inset:5px;border-radius:7px;background:linear-gradient(135deg,#0c0c18,#1a1a2e)}
  .brand-logo svg{position:absolute;inset:0;margin:auto;z-index:2}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:.2px}
  .brand-sub{font-size:10.5px;color:var(--text-5);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
  .brand-version{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-4);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);padding:2px 7px;border-radius:5px}

  /* ===== Nav ===== */
  .nav-section{margin-top:14px}
  .nav-title{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-6);padding:0 10px 8px;font-weight:600}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;
    font-size:13px;color:var(--text-3);font-weight:500;cursor:pointer;
    transition:all .15s ease;position:relative;
  }
  .nav-item:hover{background:var(--bg-soft);color:var(--text-2)}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(168,85,247,.16), rgba(168,85,247,.04));
    color:var(--text-1);
    box-shadow:inset 0 0 0 1px rgba(168,85,247,.22);
  }
  .nav-item.active::before{
    content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:0 3px 3px 0;
    background:linear-gradient(180deg,#a855f7,#ec4899);
    box-shadow:0 0 12px rgba(168,85,247,.6);
  }
  .nav-item svg{width:17px;height:17px;stroke-width:2;flex-shrink:0}
  .nav-badge{margin-left:auto;background:rgba(236,72,153,.18);color:#f9a8d4;font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600;font-family:'JetBrains Mono',monospace}
  .nav-badge.cyan{background:rgba(6,182,212,.18);color:#67e8f9}
  .nav-badge.amber{background:rgba(245,158,11,.18);color:#fcd34d}

  /* ===== Sidebar bottom (user) ===== */
  .sidebar-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border-soft)}
  .user-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--border-soft);border:1px solid var(--border-soft)}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#a855f7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px var(--border-strong)}
  .user-name{font-size:12.5px;font-weight:600}
  .user-role{font-size:10.5px;color:var(--text-5)}

  /* ===== Topbar ===== */
  .search{
    display:flex;align-items:center;gap:9px;background:var(--bg-soft);
    border:1px solid var(--border);border-radius:10px;padding:7px 13px;
    width:340px;font-size:13px;color:var(--text-4);transition:all .15s;
  }
  .search:hover{border-color:var(--border-strong)}
  .search:focus-within{border-color:rgba(168,85,247,.45);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
  .search svg{width:14px;height:14px;stroke-width:2.2}
  .search kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--border);border:1px solid var(--border-strong);padding:1px 5px;border-radius:4px;margin-left:auto;color:var(--text-3)}
  .top-actions{display:flex;align-items:center;gap:10px}
  .top-pill{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;font-size:11.5px;font-weight:500}
  .pulse-dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 0 0 rgba(16,185,129,.5);animation:pulse 1.8s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}
    70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}
    100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}
  }
  .icon-btn{
    width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    background:var(--bg-soft);border:1px solid var(--border);
    transition:all .15s;
  }
  .icon-btn:hover{background:var(--border);border-color:var(--border-strong)}
  .icon-btn svg{width:16px;height:16px;stroke-width:2}
  .provider-chip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 5px;border-radius:999px;background:var(--bg-soft);border:1px solid var(--border);font-size:12px}
  .provider-chip .dot{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

  /* ===== Page header ===== */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
  .page-title{font-size:24px;font-weight:700;letter-spacing:-.3px;color:var(--text-1)}
  .page-sub{font-size:13px;color:#8b91ad;margin-top:4px}

  /* ===== Glass card ===== */
  .card{
    background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));
    border:1px solid var(--border);
    border-radius:16px;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:0 1px 0 var(--bg-soft) inset, 0 8px 24px -8px rgba(0,0,0,.5);
  }
  .card-pad{padding:20px 22px}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-soft)}
  .card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .card-title svg{width:15px;height:15px;stroke-width:2;color:#a78bfa}
  .card-sub{font-size:11.5px;color:var(--text-5)}

  /* ===== KPI card ===== */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .kpi{
    position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--border-soft),rgba(255,255,255,.02));
    border:1px solid var(--border);
    border-radius:16px;padding:18px 20px;
    transition:all .2s ease;
  }
  .kpi:hover{transform:translateY(-2px);border-color:rgba(168,85,247,.3);box-shadow:0 12px 32px -8px rgba(168,85,247,.3)}
  .kpi::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 100% 0%, var(--accent,rgba(168,85,247,.18)), transparent 60%);pointer-events:none}
  .kpi-icon{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent,rgba(168,85,247,.25)),transparent);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;
  }
  .kpi-icon svg{width:18px;height:18px;stroke-width:2;stroke:var(--accent-color,#a78bfa)}
  .kpi-label{font-size:12px;color:var(--text-4);font-weight:500;letter-spacing:.2px}
  .kpi-value{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:4px;font-family:'Outfit',sans-serif;font-feature-settings:"tnum"}
  .kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;margin-top:6px;padding:2px 7px;border-radius:5px;font-weight:600}
  .kpi-delta.up{color:#6ee7b7;background:rgba(16,185,129,.1)}
  .kpi-delta.down{color:#fca5a5;background:rgba(239,68,68,.1)}
  .kpi-delta svg{width:11px;height:11px;stroke-width:2.5}
  .kpi-spark{margin-top:10px;height:32px;position:relative}

  /* ===== Buttons ===== */
  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;
    font-size:12.5px;font-weight:600;border:1px solid transparent;
    transition:all .15s ease;
  }
  .btn svg{width:14px;height:14px;stroke-width:2.2}
  .btn-primary{
    background:linear-gradient(135deg,#a855f7,#6366f1);
    color:#fff;
    box-shadow:0 4px 14px -2px rgba(168,85,247,.45);
  }
  .btn-primary:hover{box-shadow:0 6px 20px -2px rgba(168,85,247,.6);transform:translateY(-1px)}
  .btn-ghost{background:var(--bg-soft);border-color:var(--border);color:var(--text-2)}
  .btn-ghost:hover{background:var(--bg-soft-hover);color:var(--text-1)}
  .btn-outline{background:transparent;border-color:var(--border-strong);color:var(--text-2)}
  .btn-outline:hover{border-color:rgba(168,85,247,.45);color:var(--text-1);background:rgba(168,85,247,.08)}
  .btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
  .btn-danger:hover{background:rgba(239,68,68,.2)}

  /* ===== Charts area ===== */
  .row-2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:20px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:20px}

  /* ===== Risk capsule bar ===== */
  .capsule-row{display:flex;align-items:center;gap:14px;padding:10px 0}
  .capsule-row + .capsule-row{border-top:1px dashed var(--border-soft)}
  .capsule-label{font-size:12.5px;color:var(--text-3);min-width:90px;display:flex;align-items:center;gap:8px}
  .capsule-label .dot{width:8px;height:8px;border-radius:2px}
  .capsule-track{flex:1;height:10px;background:var(--border-soft);border-radius:6px;overflow:hidden;position:relative}
  .capsule-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .8s cubic-bezier(.16,1,.3,1)}
  .capsule-pct{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;min-width:50px;text-align:right}

  /* ===== Score bar (dual track) ===== */
  .score-row{display:flex;align-items:center;gap:14px;padding:11px 0}
  .score-row + .score-row{border-top:1px dashed var(--border-soft)}
  .score-label{font-size:12.5px;color:var(--text-3);min-width:80px}
  .score-track{flex:1;height:18px;background:rgba(99,102,241,.08);border-radius:6px;overflow:hidden;position:relative;border:1px solid rgba(99,102,241,.12)}
  .score-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#06b6d4,#a855f7);border-radius:6px;transition:width .8s cubic-bezier(.16,1,.3,1);box-shadow:0 0 12px rgba(168,85,247,.3)}
  .score-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text-2);min-width:52px;text-align:right}

  /* ===== Recent conversations ===== */
  .conv-row{display:flex;align-items:center;gap:12px;padding:11px 0;cursor:pointer;border-radius:8px;transition:all .15s}
  .conv-row:hover{background:rgba(255,255,255,.03);padding-left:10px;padding-right:10px;margin:0 -10px}
  .conv-row + .conv-row{border-top:1px dashed var(--border-soft)}
  .conv-agent{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--c1,#a855f7),var(--c2,#06b6d4));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px var(--border-strong)}
  .conv-body{flex:1;min-width:0}
  .conv-title{font-size:13px;font-weight:600;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-meta{font-size:11.5px;color:var(--text-5);margin-top:2px;display:flex;align-items:center;gap:8px}
  .conv-meta svg{width:11px;height:11px;stroke-width:2.2}

  /* ===== Pills / tags ===== */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
  .pill-purple{background:rgba(168,85,247,.14);color:#d8b4fe;border:1px solid rgba(168,85,247,.25)}
  .pill-pink{background:rgba(236,72,153,.14);color:#f9a8d4;border:1px solid rgba(236,72,153,.25)}
  .pill-cyan{background:rgba(6,182,212,.14);color:#67e8f9;border:1px solid rgba(6,182,212,.25)}
  .pill-amber{background:rgba(245,158,11,.14);color:#fcd34d;border:1px solid rgba(245,158,11,.25)}
  .pill-emerald{background:rgba(16,185,129,.14);color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}
  .pill-red{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
  .pill-zinc{background:var(--border);color:var(--text-3);border:1px solid var(--border-strong)}
  .pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

  /* ===== Tables ===== */
  .table{width:100%;border-collapse:separate;border-spacing:0}
  .table th{text-align:left;font-size:11px;font-weight:600;color:var(--text-4);letter-spacing:.8px;text-transform:uppercase;padding:12px 16px;border-bottom:1px solid var(--border)}
  .table td{padding:14px 16px;font-size:13px;color:var(--text-2);border-bottom:1px solid var(--border)}
  .table tr:hover td{background:rgba(255,255,255,.02)}
  .table tr:last-child td{border-bottom:none}

  /* ===== Chat layout ===== */
  .chat-layout{display:grid;grid-template-columns:280px 1fr 320px;gap:18px;height:calc(100vh - 64px - 56px)}
  .chat-side,.chat-main,.chat-tools{display:flex;flex-direction:column;min-height:0}
  .agent-list{flex:1;overflow-y:auto;padding:8px}
  .agent-list-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;
    transition:all .15s;margin-bottom:3px;
  }
  .agent-list-item:hover{background:var(--bg-soft)}
  .agent-list-item.active{background:linear-gradient(90deg,rgba(168,85,247,.18),rgba(168,85,247,.04));box-shadow:inset 0 0 0 1px rgba(168,85,247,.25)}
  .agent-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--c1,#a855f7),var(--c2,#06b6d4));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px var(--border-strong)}
  .agent-info{flex:1;min-width:0}
  .agent-name{font-size:12.5px;font-weight:600;color:var(--text-2)}
  .agent-desc{font-size:10.5px;color:var(--text-5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-soft)}
  .chat-header-left{display:flex;align-items:center;gap:12px}
  .chat-title-block .title{font-size:14px;font-weight:600}
  .chat-title-block .sub{font-size:11.5px;color:var(--text-5)}
  .chat-stream{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
  .msg{max-width:78%;display:flex;flex-direction:column;gap:6px}
  .msg.user{align-self:flex-end;align-items:flex-end}
  .msg .role{font-size:10.5px;color:var(--text-5);font-weight:600;letter-spacing:.4px;text-transform:uppercase}
  .msg .bubble{
    padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.65;
    background:var(--border-soft);border:1px solid var(--border);
  }
  .msg.user .bubble{
    background:linear-gradient(135deg,#a855f7,#6366f1);
    border-color:var(--border-strong);color:#fff;
    box-shadow:0 4px 14px -2px rgba(168,85,247,.4);
  }
  .msg.assistant .bubble{background:var(--bg-soft)}
  .bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:4px;color:#fbbf24}
  .tool-call{
    display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
    background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);
    font-size:12px;color:#a5f3fc;
  }
  .tool-call.running{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#fcd34d}
  .tool-call.success{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.18);color:#6ee7b7}
  .tool-call.failed{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);color:#fca5a5}
  .tool-call svg{width:13px;height:13px;stroke-width:2.2;flex-shrink:0}
  .tool-call .name{font-family:'JetBrains Mono',monospace;font-weight:600}
  .tool-call .meta{margin-left:auto;font-size:10.5px;opacity:.8}

  .chat-input{padding:14px 18px;border-top:1px solid var(--border-soft)}
  .chat-input-box{
    display:flex;align-items:flex-end;gap:10px;padding:10px 12px;
    background:var(--bg-soft);border:1px solid var(--border);border-radius:12px;
    transition:all .15s;
  }
  .chat-input-box:focus-within{border-color:rgba(168,85,247,.4);box-shadow:0 0 0 3px rgba(168,85,247,.1)}
  .chat-input-box textarea{
    flex:1;background:none;border:none;outline:none;resize:none;
    color:var(--text-2);font-size:13.5px;line-height:1.5;max-height:140px;min-height:24px;
    font-family:inherit;
  }
  .chat-input-box textarea::placeholder{color:#6b7280}
  .chat-tools{display:flex;gap:6px}

  /* ===== Tools timeline (right panel) ===== */
  .tools-timeline{padding:14px;flex:1;overflow-y:auto}
  .tool-step{
    display:flex;gap:12px;padding:10px 0;position:relative;
  }
  .tool-step::before{
    content:"";position:absolute;left:11px;top:24px;bottom:-6px;width:1px;
    background:linear-gradient(180deg,rgba(168,85,247,.4),transparent);
  }
  .tool-step:last-child::before{display:none}
  .tool-step-dot{
    width:23px;height:23px;border-radius:50%;flex-shrink:0;
    background:rgba(168,85,247,.18);border:1.5px solid rgba(168,85,247,.5);
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#d8b4fe;
  }
  .tool-step.success .tool-step-dot{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.5);color:#6ee7b7}
  .tool-step.running .tool-step-dot{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.5);color:#fcd34d;animation:spin 1.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tool-step-body{flex:1;min-width:0}
  .tool-step-name{font-size:12.5px;font-weight:600;color:var(--text-2)}
  .tool-step-args{font-size:11px;color:var(--text-4);margin-top:2px;font-family:'JetBrains Mono',monospace}
  .tool-step-result{font-size:11px;color:var(--text-5);margin-top:4px}

  /* ===== Agent grid ===== */
  .agent-section{margin-bottom:32px}
  .agent-section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .agent-section-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px var(--border)}
  .agent-section-icon svg{width:15px;height:15px;stroke-width:2.2}
  .agent-section-title{font-size:13px;font-weight:700;letter-spacing:.3px}
  .agent-section-count{font-size:11px;color:var(--text-5);background:var(--border-soft);padding:2px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace}

  .agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .agent-card{
    position:relative;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));
    border:1px solid var(--border);border-radius:14px;padding:16px;
    transition:all .2s;cursor:pointer;
  }
  .agent-card::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 100% 0%, var(--glow,rgba(168,85,247,.18)), transparent 60%);opacity:0;transition:opacity .2s}
  .agent-card:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:0 16px 40px -12px rgba(0,0,0,.6)}
  .agent-card:hover::before{opacity:1}
  .agent-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;position:relative;z-index:1}
  .agent-card-icon{
    width:40px;height:40px;border-radius:11px;
    background:linear-gradient(135deg,var(--c1,#a855f7),var(--c2,#06b6d4));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px -2px var(--glow,rgba(168,85,247,.4)), inset 0 0 0 1px var(--border-strong);
  }
  .agent-card-icon svg{width:20px;height:20px;stroke:#fff;stroke-width:2}
  .agent-card-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
  .agent-card-role{font-size:11px;color:var(--text-5);letter-spacing:.3px}
  .agent-card-desc{font-size:12.5px;color:var(--text-3);line-height:1.6;margin:10px 0 12px;min-height:60px}
  .agent-card-tags{display:flex;flex-wrap:wrap;gap:5px}
  .agent-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:1px dashed var(--border)}
  .agent-card-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-4)}

  /* ===== Form controls ===== */
  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
  .field-label{font-size:12px;font-weight:600;color:var(--text-3);display:flex;align-items:center;gap:6px}
  .field-hint{font-size:11px;color:var(--text-5);line-height:1.5}
  .input,.select,.textarea{
    width:100%;padding:9px 12px;border-radius:9px;
    background:var(--bg-soft);border:1px solid var(--border);
    color:var(--text-2);font-size:13px;transition:all .15s;
  }
  .input:hover,.select:hover,.textarea:hover{border-color:var(--border-strong)}
  .input:focus,.select:focus,.textarea:focus{outline:none;border-color:rgba(168,85,247,.45);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
  .textarea{min-height:80px;resize:vertical;line-height:1.6;font-family:inherit}

  /* Slider */
  .slider-wrap{display:flex;align-items:center;gap:12px}
  .slider-track{
    flex:1;height:6px;background:var(--border);border-radius:3px;position:relative;cursor:pointer;
  }
  .slider-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#a855f7,#06b6d4);border-radius:3px;box-shadow:0 0 12px rgba(168,85,247,.4)}
  .slider-thumb{
    position:absolute;top:50%;width:16px;height:16px;border-radius:50%;
    background:#fff;box-shadow:0 0 0 4px rgba(168,85,247,.25), 0 2px 8px rgba(0,0,0,.4);
    transform:translate(-50%,-50%);cursor:grab;
  }
  .slider-thumb:active{cursor:grabbing}
  .slider-value{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:#a78bfa;min-width:54px;text-align:right}

  /* Toggle */
  .toggle{width:38px;height:22px;border-radius:11px;background:var(--border-strong);position:relative;cursor:pointer;transition:all .2s}
  .toggle::after{content:"";position:absolute;left:2px;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:all .2s}
  .toggle.on{background:linear-gradient(135deg,#a855f7,#6366f1)}
  .toggle.on::after{left:18px}

  /* ===== Section divider ===== */
  .section-title{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .section-title h3{font-size:14px;font-weight:700;color:var(--text-2)}
  .section-title .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-strong),transparent)}

  /* ===== Empty state ===== */
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 20px;text-align:center;
  }
  .empty-icon{
    width:64px;height:64px;border-radius:18px;
    background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(6,182,212,.1));
    border:1px solid rgba(168,85,247,.2);
    display:flex;align-items:center;justify-content:center;margin-bottom:14px;
  }
  .empty-icon svg{width:30px;height:30px;stroke-width:1.7;stroke:#a78bfa}
  .empty-title{font-size:14px;font-weight:600;color:var(--text-3);margin-bottom:4px}
  .empty-desc{font-size:12px;color:var(--text-5);max-width:280px;line-height:1.55}

  /* ===== Page visibility ===== */
  .page{display:none}
  .page.active{display:block;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ===== Toast ===== */
  .toast-stack{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:100;pointer-events:none}
  .toast{
    display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
    background:rgba(15,15,26,.85);border:1px solid var(--border);
    box-shadow:0 12px 32px -8px rgba(0,0,0,.5);
    backdrop-filter:blur(20px);
    animation:slideIn .3s cubic-bezier(.16,1,.3,1);
    pointer-events:auto;min-width:260px;
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
  .toast.success{border-color:rgba(16,185,129,.3)}
  .toast.success .ico{color:#6ee7b7}
  .toast.info .ico{color:#67e8f9}
  .toast.warn .ico{color:#fcd34d}
  .toast .ico{width:20px;height:20px;flex-shrink:0}
  .toast .ico svg{width:100%;height:100%;stroke-width:2.2}

  /* ===== Misc ===== */
  .grid-cols-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid-cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .grid-cols-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .divider{height:1px;background:var(--border);margin:18px 0}
  .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}.mb-6{margin-bottom:24px}
  .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
  .text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--text-5)}.text-bright{color:var(--text-1)}
  .mono{font-family:'JetBrains Mono',monospace}
  .text-emerald{color:#6ee7b7}.text-amber{color:#fcd34d}.text-red{color:#fca5a5}.text-purple{color:#d8b4fe}.text-cyan{color:#67e8f9}
  .w-full{width:100%}

  /* Heatmap */
  .heat-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:8px}
  .heat-cell{aspect-ratio:1;border-radius:3px;background:var(--bg-soft);transition:all .15s}
  .heat-cell.l1{background:rgba(168,85,247,.18)}
  .heat-cell.l2{background:rgba(168,85,247,.4)}
  .heat-cell.l3{background:rgba(168,85,247,.65)}
  .heat-cell.l4{background:linear-gradient(135deg,#a855f7,#ec4899);box-shadow:0 0 6px rgba(168,85,247,.4)}

  /* Loading shimmer */
  .shimmer{background:linear-gradient(90deg,var(--bg-soft) 0%,var(--bg-soft-hover) 50%,var(--bg-soft) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* ===== Student panel (inline, below table) ===== */
  #studentDetailWrap{margin-top:20px}
  .student-panel{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:var(--shadow-card);
    overflow:hidden;
    animation:panelSlideIn .35s cubic-bezier(.16,1,.3,1);
  }
  @keyframes panelSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .student-panel-head{
    display:flex;align-items:center;gap:16px;padding:20px 24px;
    background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(6,182,212,.04));
    border-bottom:1px solid var(--border-soft);
  }
  .student-panel-avatar{
    width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:700;color:#fff;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15), 0 4px 14px -2px rgba(168,85,247,.4);
  }
  .student-panel-title{flex:1;min-width:0}
  .student-panel-title .name-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .student-panel-title h2{font-size:22px;font-weight:700;color:var(--text-1);letter-spacing:-.3px}
  .student-panel-title .meta-row{font-size:12px;color:var(--text-5);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .student-panel-actions{display:flex;gap:8px;flex-shrink:0}
  .student-panel-tabs{
    display:flex;padding:0 24px;border-bottom:1px solid var(--border-soft);
    background:var(--bg-soft);gap:2px;overflow-x:auto;
  }
  .student-panel-tab{
    padding:12px 16px;font-size:12.5px;font-weight:600;color:var(--text-4);
    cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
    margin-bottom:-1px;white-space:nowrap;
  }
  .student-panel-tab:hover{color:var(--text-2)}
  .student-panel-tab.active{color:#a78bfa;border-bottom-color:#a855f7}
  .student-panel-content{padding:22px 24px}
  .sp-pane{display:none;animation:fadeIn .2s ease}
  .sp-pane.active{display:block}

  /* Clickable rows + selected state */
  tr[data-student]{cursor:pointer;transition:background .15s}
  tr[data-student]:hover td{background:rgba(168,85,247,.08)!important}
  tr[data-student].selected td{background:rgba(168,85,247,.1)!important;box-shadow:inset 3px 0 0 #a855f7}
</style>

                </div>
                <div class="card" style="padding:18px 20px">
                  <div class="section-title" style="margin-bottom:14px"><h3>${icon('activity', 14)}最近活动</h3><div class="line"></div></div>
                  ${d.timeline.map(t => `
                    <div style="display:flex;gap:10px;padding:8px 0;position:relative">
                      <div style="width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);margin-top:6px;flex-shrink:0;box-shadow:0 0 0 3px var(--bg-card)"></div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;gap:8px">
                          <span style="font-size:12.5px;font-weight:600;color:var(--text-1)">${t.agent}</span>
                          <span style="font-size:11px;color:var(--text-5)" class="mono">${t.time}</span>
                        </div>
                        <div style="font-size:12.5px;color:var(--text-3);line-height:1.6">${t.text}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
            <!-- TAB: academic -->
            <div class="sp-pane" data-pane="academic">
              <div class="card" style="padding:18px 20px">
                <div class="section-title" style="margin-bottom:14px"><h3>${icon('trend', 14)}最近一次月考成绩</h3><div class="line"></div></div>
                <table class="table" style="margin:0 -20px;width:calc(100% + 40px)">
                  <thead><tr><th>科目</th><th>分数</th><th>趋势</th><th>分布</th></tr></thead>
                  <tbody>
                    ${d.grades.map(g => `
                      <tr>
                        <td style="font-weight:600;color:var(--text-1)">${g.subj}</td>
                        <td class="mono" style="font-weight:600;color:${g.score >= 85 ? '#34d399' : g.score >= 70 ? '#fbbf24' : '#f87171'}">${g.score}</td>
                        <td class="mono" style="font-size:12px;color:var(--text-3)">${trend(g.trend)}</td>
                        <td><div class="score-track" style="height:8px"><div class="score-fill" style="width:${g.score}%;background:linear-gradient(90deg,#a855f7,#06b6d4)"></div></div></td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <!-- TAB: behavior -->
            <div class="sp-pane" data-pane="behavior">
              <div class="card" style="padding:18px 20px">
                <div class="section-title" style="margin-bottom:14px"><h3>${icon('alert', 14)}行为记录</h3><div class="line"></div></div>
                ${d.behavior.map(b => {
                  const colorMap = { '表扬': 'pill-emerald', '日常': 'pill-zinc', '关注': 'pill-amber', '违规': 'pill-red', '严重': 'pill-pink' };
                  return `
                    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px dashed var(--border)">
                      <span class="mono" style="color:var(--text-5);font-size:11.5px;min-width:42px">${b.date}</span>
                      <span class="pill ${colorMap[b.type] || 'pill-zinc'}" style="min-width:48px;justify-content:center"><span class="pill-dot"></span>${b.type}</span>
                      <span class="mono pill pill-zinc" style="font-size:10.5px">${b.code}</span>
                      <span style="flex:1;font-size:12.5px;color:var(--text-3)">${b.desc}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
            <!-- TAB: contact -->
            <div class="sp-pane" data-pane="contact">
              <div class="card" style="padding:20px 22px;margin-bottom:14px;background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(245,158,11,.04))">
                <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
                  <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#ec4899,#f59e0b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">${d.guardian.name.charAt(0)}</div>
                  <div>
                    <div style="font-size:15px;font-weight:700;color:var(--text-1)">${d.guardian.name}</div>
                    <div style="font-size:11.5px;color:var(--text-5)">${d.guardian.rel} · ${d.guardian.occ}</div>
                  </div>
                </div>
                <dl class="kv" style="grid-template-columns:80px 1fr">
                  <dt>电话</dt><dd class="mono">${d.guardian.phone}</dd>
                  <dt>关系</dt><dd>${d.guardian.rel}</dd>
                  <dt>职业</dt><dd>${d.guardian.occ}</dd>
                </dl>
                <div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--border)">
                  <button class="btn btn-primary" style="flex:1">${icon('message', 13)}发送消息</button>
                  <button class="btn btn-ghost">${icon('phone', 13)}电话</button>
                  <button class="btn btn-ghost">${icon('history', 13)}沟通记录</button>
                </div>
              </div>
            </div>
            <!-- TAB: privacy -->
            <div class="sp-pane" data-pane="privacy">
              <div class="row-2">
                <div class="card" style="border-left:3px solid #10b981;padding:18px 20px">
                  <div class="section-title" style="margin-bottom:12px"><h3>${icon('shield', 14)}PII 假名化</h3><div class="line"></div></div>
                  <div style="font-size:12.5px;color:var(--text-3);line-height:1.7;margin-bottom:14px">显示给 AI 的是 <code class="mono" style="background:var(--bg-soft);padding:1px 5px;border-radius:4px;color:#fbbf24">S_${d.id.slice(2)}</code> 假名，AI 永远看不到明文姓名。</div>
                  <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px">
                    <div style="font-size:10.5px;color:var(--text-5);margin-bottom:4px">AI 看到的提示</div>
                    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6ee7b7">学生 S_${d.id.slice(2)} 最近成绩有所下降，建议关注。</div>
                  </div>
                </div>
                <div class="card" style="border-left:3px solid #06b6d4;padding:18px 20px">
                  <div class="section-title" style="margin-bottom:12px"><h3>${icon('filter', 14)}定向发送过滤</h3><div class="line"></div></div>
                  <div style="font-size:12.5px;color:var(--text-3);line-height:1.7;margin-bottom:14px">给该家长发消息时，其他学生真实姓名自动替换为"其他同学"。</div>
                  <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px">
                    <div style="font-size:10.5px;color:var(--text-5);margin-bottom:4px">即将发送</div>
                    <div style="font-size:12px;color:#d1d5db;line-height:1.6">${d.guardian.name.replace(/./g, c => Math.random() > 0.5 ? c : c)} 您好，您孩子 ${d.name} 最近表现稳定，与<span style="color:#6ee7b7">其他同学</span>相处融洽。</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    function openStudentDetail(id) {
      const wrap = document.getElementById('studentDetailWrap');
      if (!wrap) return;
      wrap.innerHTML = renderStudentDetail(id);
      // Wire tabs
      wrap.querySelectorAll('.student-panel-tab').forEach(t => {
        t.addEventListener('click', () => {
          wrap.querySelectorAll('.student-panel-tab').forEach(x => x.classList.remove('active'));
          wrap.querySelectorAll('.sp-pane').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          wrap.querySelector(`[data-pane="${t.dataset.tab}"]`).classList.add('active');
        });
      });
      // Highlight selected row
      document.querySelectorAll('tr[data-student]').forEach(r => r.classList.remove('selected'));
      const row = document.querySelector(`tr[data-student="${id}"]`);
      if (row) row.classList.add('selected');
      // Scroll into view
      setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
    function closeStudentDetail() {
      const wrap = document.getElementById('studentDetailWrap');
      if (wrap) wrap.innerHTML = '';
      document.querySelectorAll('tr[data-student]').forEach(r => r.classList.remove('selected'));
    }
    init();
  </script>
</body>
</html>
