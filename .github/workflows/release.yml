name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Cancel in-progress runs for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  # ----------------------------------------------------------------
  # Build all platform installers.
  # ----------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — NSIS + portable
          - os: windows-latest
            target: win
            arch: x64
          # macOS x64 (Intel) — dmg
          - os: macos-latest
            target: mac
            arch: x64
          # macOS arm64 (Apple Silicon) — dmg
          - os: macos-latest
            target: mac
            arch: arm64
          # Linux x64 — AppImage + deb
          - os: ubuntu-22.04
            target: linux
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Test
        shell: bash
        run: npm run test

      - name: Fetch Rust EAA binary
        shell: bash
        run: npm run build:eaa

      - name: Build
        shell: bash
        run: npm run build

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing environment variables (set in repo settings)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          npx electron-builder \
            --${{ matrix.target }} \
            --${{ matrix.arch }} \
            --publish never \
            --config.extraMetadata.version=${GITHUB_REF_NAME#v}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
          retention-days: 14
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Publish the GitHub Release.
  # ----------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write # for sigstore / cosign signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Sign checksums (cosign)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature artifacts/SHA256SUMS.sig \
            --output-certificate artifacts/SHA256SUMS.pem \
            artifacts/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/SHA256SUMS
            artifacts/SHA256SUMS.sig
            artifacts/SHA256SUMS.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
