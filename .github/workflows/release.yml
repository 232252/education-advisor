name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.3). Leave blank to use the current version from Cargo.toml.'
        required: false
        default: ''
      draft:
        description: 'Create a draft release (no notification).'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop tier 1 — full feature set (tray icon enabled)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''
            archive: tar.gz
            label: linux-x64
            features: tray
            install_linux_deps: 'true'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
            label: windows-x64
            features: tray
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
            archive: tar.gz
            label: macos-x64
            features: tray
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
            archive: tar.gz
            label: macos-arm64
            features: tray
          # Desktop tier 2 — headless (no tray) for ARM Linux / Windows ARM
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            ext: ''
            archive: tar.gz
            label: linux-arm64
            features: ''
            install_linux_deps: 'true'
            cross: 'true'
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: .exe
            archive: zip
            label: windows-arm64
            features: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Install Linux system dependencies
        if: matrix.install_linux_deps == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxext-dev libxrandr-dev \
            libgl1-mesa-dev libasound2-dev libudev-dev \
            libappindicator3-dev libgtk-3-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.label == 'linux-arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        working-directory: .
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        shell: bash
        run: |
          FEAT_FLAGS=""
          if [ -n "${{ matrix.features }}" ]; then
            FEAT_FLAGS="--features ${{ matrix.features }}"
          fi
          cargo build --locked --release --target ${{ matrix.target }} $FEAT_FLAGS

      - name: Package (Unix)
        if: runner.os != 'Windows'
        working-directory: .
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=${{ github.event.inputs.tag }}
          [ -z "$VERSION" ] && VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          NAME=education-advisor-egui-v${VERSION}-${{ matrix.label }}
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/education-advisor-egui${{ matrix.ext }} dist/$NAME/
          cp README.md dist/$NAME/ 2>/dev/null || true
          cp LICENSE dist/$NAME/ 2>/dev/null || true
          cp LICENSE-APACHE dist/$NAME/ 2>/dev/null || true
          cp CHANGELOG.md dist/$NAME/ 2>/dev/null || true
          # Bundle the v0.1.0-rc.1-recovered persona/rules assets so the
          # binary has access to the full agent prompts and the
          # PII Shield compliance rules on first launch.
          for d in agents config skills; do
            if [ -d "$d" ]; then
              cp -r "$d" dist/$NAME/
            fi
          done
          cd dist
          tar czf $NAME.${{ matrix.archive }} $NAME
          sha256sum $NAME.${{ matrix.archive }} > $NAME.${{ matrix.archive }}.sha256
          echo "ASSET=$NAME.${{ matrix.archive }}" >> $GITHUB_ENV
          echo "CHECKSUM=$NAME.${{ matrix.archive }}.sha256" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrEmpty($version)) {
            $version = "${{ github.event.inputs.tag }}".TrimStart('v')
          }
          if ([string]::IsNullOrEmpty($version)) {
            $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          }
          $name = "education-advisor-egui-v$version-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/education-advisor-egui${{ matrix.ext }}" "dist/$name/"
          Copy-Item "README.md" "dist/$name/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "dist/$name/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE-APACHE" "dist/$name/" -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" "dist/$name/" -ErrorAction SilentlyContinue
          # Bundle v0.1.0-rc.1-recovered persona/rules assets.
          foreach ($d in @("agents", "config", "skills")) {
            if (Test-Path $d) {
              Copy-Item -Recurse -Force $d "dist/$name/"
            }
          }
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.${{ matrix.archive }}"
          $hash = (Get-FileHash "dist/$name.${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.${{ matrix.archive }}" | Out-File -FilePath "dist/$name.${{ matrix.archive }}.sha256" -Encoding ascii
          "ASSET=$name.${{ matrix.archive }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM=$name.${{ matrix.archive }}.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            dist/${{ env.ASSET }}
            dist/${{ env.CHECKSUM }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION=${{ github.event.inputs.tag }}
          elif [ -n "${{ github.ref_name }}" ]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Education Advisor ${{ env.VERSION }}
          body: |
            ## 下载

            | 平台 | 架构 | 文件 |
            | --- | --- | --- |
            | Linux | x86_64 | `education-advisor-egui-${{ env.VERSION }}-linux-x64.tar.gz` |
            | Linux | aarch64 | `education-advisor-egui-${{ env.VERSION }}-linux-arm64.tar.gz` |
            | Windows | x86_64 | `education-advisor-egui-${{ env.VERSION }}-windows-x64.zip` |
            | Windows | aarch64 | `education-advisor-egui-${{ env.VERSION }}-windows-arm64.zip` |
            | macOS | Intel | `education-advisor-egui-${{ env.VERSION }}-macos-x64.tar.gz` |
            | macOS | Apple Silicon | `education-advisor-egui-${{ env.VERSION }}-macos-arm64.tar.gz` |

            每个 archive 都附带同名的 `.sha256` 校验和文件。

            ## 安装

            1. 解压到任意目录
            2. 在 `设置` → `AI 行为` → `提供商` 中添加至少一个 LLM 提供商
            3. 启动首对话

            详细文档见仓库 `README.md`。
          files: dist/*
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ contains(env.VERSION, '-') }}
