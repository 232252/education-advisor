name: Eval Harness

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-eval-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-eval-
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Run eval harness (stub trace + stub judge)
        run: |
          cargo run --manifest-path src-tauri/Cargo.toml --bin eval-runner -- \
            --dataset eval/datasets/education_v1.jsonl \
            --out-dir reports/eval \
            --pass-rate 0.3 \
            --judge-model stub \
            --stub-judge

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-reports
          path: reports/eval/
