name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Build eaa CLI
      run: |
        cd core/eaa-cli
        cargo build --release

    - name: Validate data
      run: |
        cd core/eaa-cli
        ./target/release/eaa validate
        ./target/release/eaa info

  lint-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check references
      run: |
        # Ensure no copaw references remain
        ! grep -r "copaw" --include="*.md" --include="*.yaml" --include="*.sh" .
        echo "No copaw references found ✓"
