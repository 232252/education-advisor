name: CI

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main, release/**]

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # Quality gates — must pass before any merge.
  # ----------------------------------------------------------------
  quality-gates:
    name: Quality gates (typecheck + lint + test)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Show environment
        shell: bash
        run: |
          node -v
          npm -v
          echo "Runner: ${{ runner.os }}"

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Test
        shell: bash
        run: npm run test

      - name: Build (renderer + main)
        shell: bash
        run: npm run build

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/
            !dist/**/*.map
          retention-days: 7

  # ----------------------------------------------------------------
  # CodeQL — security static analysis.
  # ----------------------------------------------------------------
  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [typescript, javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  # ----------------------------------------------------------------
  # Auto-update manifest — runs on tagged releases.
  # ----------------------------------------------------------------
  auto-update-manifest:
    name: Generate auto-update manifest
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality-gates
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate manifest
        shell: bash
        run: |
          # Build the latest.yml / latest-mac.yml / latest-linux.yml
          # that electron-builder's auto-update expects.
          node scripts/generate-update-manifest.mjs "${{ github.ref_name }}"

      - name: Upload manifests
        uses: actions/upload-artifact@v7
        with:
          name: update-manifests
          path: |
            latest.yml
            latest-mac.yml
            latest-linux.yml
            release-notes.md
          retention-days: 30
