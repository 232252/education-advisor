name: Packages

# Native platform installers:
#   * Linux:   .deb (Debian / Ubuntu) + .rpm (Fedora / RHEL)
#   * Windows: .msi (WiX) — pure-Rust installer with cargo-wix
#   * macOS:   .pkg and signed .app bundle (post-signing step optional)
#
# This job runs on tag pushes alongside the binary release workflow. It
# can also be triggered manually to produce installers from the current
# Cargo.toml version.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux-packages:
    name: Linux packages (${{ matrix.label }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            label: amd64
            cargo_target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            label: arm64
            cargo_target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cargo_target }}-tray

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxext-dev libxrandr-dev \
            libgl1-mesa-dev libasound2-dev libudev-dev \
            libappindicator3-dev libgtk-3-dev \
            rpm fakeroot

      - name: Install cross toolchain (ARM64)
        if: matrix.label == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        working-directory: .
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --locked --release --target ${{ matrix.cargo_target }} --features tray

      - name: Resolve version
        id: ver
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Stage .deb payload
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.cargo_target }}/release/education-advisor-egui
          DEST=stage/education-advisor_${VERSION}_${{ matrix.label }}
          mkdir -p $DEST/DEBIAN $DEST/usr/bin $DEST/usr/share/applications $DEST/usr/share/icons/hicolor/256x256/apps
          cp $BIN $DEST/usr/bin/education-advisor-egui
          cp README.md CHANGELOG.md $DEST/usr/share/doc/education-advisor/ 2>/dev/null || true
          cat > $DEST/DEBIAN/control <<EOF
          Package: education-advisor
          Version: ${VERSION}
          Section: education
          Priority: optional
          Architecture: ${{ matrix.label }}
          Maintainer: Education Advisor Team <noreply@example.com>
          Description: Commercial-grade AI education management desktop application.
           18 specialised AI agents, 30+ LLM providers, local-first privacy.
          EOF
          cat > $DEST/usr/share/applications/education-advisor.desktop <<EOF
          [Desktop Entry]
          Name=Education Advisor
          Comment=AI education management
          Exec=education-advisor-egui
          Icon=education-advisor
          Type=Application
          Categories=Education;Office;
          EOF
          # Build a tiny placeholder icon (the real icon is bundled in
          # the binary; this entry just satisfies the desktop spec).
          : > $DEST/usr/share/icons/hicolor/256x256/apps/education-advisor.png
          mkdir -p artifacts
          dpkg-deb --build $DEST artifacts/education-advisor_${VERSION}_${{ matrix.label }}.deb

      - name: Stage .rpm payload
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.cargo_target }}/release/education-advisor-egui
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cat > rpmbuild/SPECS/education-advisor.spec <<EOF
          Name: education-advisor
          Version: ${VERSION}
          Release: 1%{?dist}
          Summary: AI education management desktop app
          License: MIT OR Apache-2.0
          %description
          Commercial-grade AI education management desktop application.
          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 0755 $BIN %{buildroot}/usr/bin/education-advisor-egui
          %files
          /usr/bin/education-advisor-egui
          EOF
          rpmbuild -ba --target=${{ matrix.cargo_target }} \
            --define "_topdir $(pwd)/rpmbuild" \
            rpmbuild/SPECS/education-advisor.spec
          mkdir -p artifacts
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.label }}
          path: artifacts/*

  windows-msi:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc-tray-msi

      - name: Install WiX toolset
        run: cargo install --locked cargo-wix

      - name: Build binary
        run: |
          cargo build --locked --release --target x86_64-pc-windows-msvc --features tray

      - name: Build MSI
        run: |
          cargo wix --target x86_64-pc-windows-msvc --features tray

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-x64
          path: target/wix/*.msi

  macos-dmg:
    name: macOS DMG
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin-tray-dmg

      - name: Build binary
        run: |
          cargo build --locked --release --target aarch64-apple-darwin --features tray

      - name: Stage .app bundle
        run: |
          set -euo pipefail
          BIN=target/aarch64-apple-darwin/release/education-advisor-egui
          APP=stage/Education Advisor.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/education-advisor-egui"
          chmod +x "$APP/Contents/MacOS/education-advisor-egui"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Education Advisor</string>
            <key>CFBundleDisplayName</key><string>Education Advisor</string>
            <key>CFBundleIdentifier</key><string>app.education-advisor.desktop</string>
            <key>CFBundleVersion</key><string>1.0.2</string>
            <key>CFBundleShortVersionString</key><string>1.0.2</string>
            <key>CFBundleExecutable</key><string>education-advisor-egui</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          mkdir -p artifacts
          hdiutil create -ov -volname "Education Advisor" -fs HFS+ -srcfolder "$APP" artifacts/Education-Advisor.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: artifacts/*.dmg

  attach:
    name: Attach installers to release
    needs: [linux-packages, windows-msi, macos-dmg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          fail_on_unmatched_files: false