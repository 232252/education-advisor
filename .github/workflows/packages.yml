name: Packages

# Native platform installers. Each installer job runs on its own host
# architecture so we never have to cross-compile (egui + native
# toolkits like GTK / AppKit are notoriously hard to cross-build):
#
#   * Linux:   .deb (Debian / Ubuntu) + .rpm (Fedora / RHEL) — amd64
#   * Windows: .msi (WiX) — x64
#   * macOS:   .dmg (aarch64) — Apple Silicon
#
# The release workflow has already produced the per-platform binaries;
# this workflow just packages them. Run on tag pushes alongside the
# release workflow, or trigger manually to refresh installers for an
# existing release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux-packages:
    name: Linux packages (amd64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-tray

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxext-dev libxrandr-dev \
            libgl1-mesa-dev libasound2-dev libudev-dev \
            libappindicator3-dev libgtk-3-dev \
            rpm fakeroot

      - name: Build release binary
        run: |
          cargo build --locked --release --target x86_64-unknown-linux-gnu --features tray

      - name: Resolve version
        id: ver
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Stage .deb payload
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          BIN=target/x86_64-unknown-linux-gnu/release/education-advisor-egui
          test -f "$BIN" || { echo "ERROR: missing $BIN"; ls -la target/x86_64-unknown-linux-gnu/release/ 2>&1 | head -10; exit 1; }
          DEST=stage/education-advisor_${VERSION}_amd64
          rm -rf "$DEST"
          mkdir -p $DEST/DEBIAN $DEST/usr/bin $DEST/usr/share/applications $DEST/usr/share/icons/hicolor/256x256/apps $DEST/usr/share/doc/education-advisor
          cp $BIN $DEST/usr/bin/education-advisor-egui
          cp README.md CHANGELOG.md $DEST/usr/share/doc/education-advisor/ 2>/dev/null || true
          # Bundle the v0.1.0-rc.1-recovered persona / compliance /
          # skills assets so the binary can load full agent prompts
          # on first launch.
          for d in agents config skills; do
            if [ -d "$d" ]; then
              mkdir -p $DEST/usr/share/education-advisor
              cp -r $d $DEST/usr/share/education-advisor/
            fi
          done
          cat > $DEST/DEBIAN/control <<EOF
          Package: education-advisor
          Version: ${VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Maintainer: Education Advisor Team <noreply@example.com>
          Description: Commercial-grade AI education management desktop application.
           18 specialised AI agents, 30+ LLM providers, local-first privacy.
          EOF
          cat > $DEST/usr/share/applications/education-advisor.desktop <<EOF
          [Desktop Entry]
          Name=Education Advisor
          Comment=AI education management
          Exec=education-advisor-egui
          Icon=education-advisor
          Type=Application
          Categories=Education;Office;
          EOF
          : > $DEST/usr/share/icons/hicolor/256x256/apps/education-advisor.png
          mkdir -p artifacts
          dpkg-deb --build $DEST artifacts/education-advisor_${VERSION}_amd64.deb

      - name: Stage .rpm payload
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          BIN=target/x86_64-unknown-linux-gnu/release/education-advisor-egui
          test -f "$BIN" || { echo "ERROR: missing $BIN"; exit 1; }
          rm -rf rpmbuild
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          # Copy the binary into SOURCES so the spec can reference it
          # with %{_sourcedir} regardless of rpmbuild's cwd.
          cp "$BIN" rpmbuild/SOURCES/education-advisor-egui
          cat > rpmbuild/SPECS/education-advisor.spec <<EOF
          Name: education-advisor
          Version: ${VERSION}
          Release: 1%{?dist}
          Summary: AI education management desktop app
          License: MIT OR Apache-2.0
          Source0: education-advisor-egui
          %description
          Commercial-grade AI education management desktop application.
          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 0755 %{_sourcedir}/education-advisor-egui %{buildroot}/usr/bin/education-advisor-egui
          %files
          /usr/bin/education-advisor-egui
          EOF
          rpmbuild -ba --target=x86_64-unknown-linux-gnu \
            --define "_topdir $(pwd)/rpmbuild" \
            rpmbuild/SPECS/education-advisor.spec
          mkdir -p artifacts
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-amd64
          path: artifacts/*

  windows-msi:
    name: Windows MSI (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc-tray-msi

      - name: Install WiX toolset
        run: cargo install --locked cargo-wix

      # The tray feature is built into the binary here; cargo-wix
      # picks up the same binary via target/wix/.
      - name: Build binary
        shell: bash
        run: |
          cargo build --locked --release --target x86_64-pc-windows-msvc --features tray

      # cargo-wix needs at least one .wxs template; ship a minimal one
      # in wix/main.wxs and an empty assets dir so the bundle has
      # something to package.
      - name: Create WiX template
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wix/assets | Out-Null
          $wxs = @'
          <?xml version='1.0' encoding='utf-8'?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Name="Education Advisor"
                     Manufacturer="Education Advisor Team"
                     Id="*"
                     UpgradeCode="C0AB1B0A-1D11-4D11-8F11-1A1B1B1B1B1B"
                     Version="0.0.0"
                     Language="1033">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="ProductFeature" Title="Education Advisor" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>
            </Product>
            <Fragment>
              <Directory Id="ProgramFilesFolder">
                <Directory Id="INSTALLDIR" Name="Education Advisor">
                  <Component Id="MainExecutable">
                    <File Source="$(var.CargoTargetDir)\release\education-advisor-egui.exe" KeyPath="yes" />
                  </Component>
                </Directory>
              </Directory>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLDIR">
                <ComponentRef Id="MainExecutable" />
              </ComponentGroup>
            </Fragment>
          </Wix>
          '@
          Set-Content -Path wix/main.wxs -Value $wxs -Encoding UTF8
          Get-Content wix/main.wxs | Select-Object -First 3

      - name: Build MSI
        shell: bash
        run: |
          cargo wix --target x86_64-pc-windows-msvc
          ls -la target/wix/

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-x64
          path: target/wix/*.msi

  macos-dmg:
    name: macOS DMG (aarch64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin-tray-dmg

      - name: Build binary
        run: |
          cargo build --locked --release --target aarch64-apple-darwin --features tray

      - name: Resolve version
        id: ver
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Stage .app bundle
        run: |
          set -euo pipefail
          BIN=target/aarch64-apple-darwin/release/education-advisor-egui
          test -f "$BIN" || { echo "ERROR: missing $BIN"; ls -la target/aarch64-apple-darwin/release/ 2>&1 | head -10; exit 1; }
          # Use a path without spaces to avoid shell word-splitting
          # under bash with default IFS. The Info.plist and the
          # bundling step can still refer to the human-friendly name.
          APP_STAGE="$GITHUB_WORKSPACE/stage/EducationAdvisor.app"
          rm -rf "$GITHUB_WORKSPACE/stage"
          mkdir -p "$APP_STAGE/Contents/MacOS" "$APP_STAGE/Contents/Resources"
          cp "$BIN" "$APP_STAGE/Contents/MacOS/education-advisor-egui"
          chmod +x "$APP_STAGE/Contents/MacOS/education-advisor-egui"
          cat > "$APP_STAGE/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Education Advisor</string>
            <key>CFBundleDisplayName</key><string>Education Advisor</string>
            <key>CFBundleIdentifier</key><string>app.education-advisor.desktop</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>education-advisor-egui</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          # Bundle the recovered persona / compliance / skills assets.
          for d in agents config skills; do
            if [ -d "$d" ]; then
              cp -r "$d" "$APP_STAGE/Contents/Resources/"
            fi
          done
          # Rename to the human-friendly form right before the DMG
          # step so the path with spaces never has to be expanded by
          # the shell as separate arguments.
          APP_FINAL="$GITHUB_WORKSPACE/stage/Education Advisor.app"
          mv "$APP_STAGE" "$APP_FINAL"
          mkdir -p artifacts
          hdiutil create -ov -volname "Education Advisor" -fs HFS+ -srcfolder "$APP_FINAL" artifacts/Education-Advisor.dmg
          ls -la artifacts/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: artifacts/*.dmg

  attach:
    name: Attach installers to release
    needs: [linux-packages, windows-msi, macos-dmg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          fail_on_unmatched_files: false
