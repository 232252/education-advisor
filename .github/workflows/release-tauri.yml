# =============================================================
# 仓库 release workflow: Tauri 三平台构建
# (Windows / macOS / Linux)
#
# 触发: push v*.*.* tag → 构建三平台安装包 + 上传 GitHub Release
# 手动: workflow_dispatch (调试用, 不发布)
#
# v0.2.0: 仓库已转正为 Tauri 单一架构, 此 workflow 即唯一 release 入口。
# =============================================================
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # 三平台并行构建 Tauri 安装包
  # ----------------------------------------------------------------
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — NSIS + MSI
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            args: ""
          # macOS x64 (Intel) — DMG (无签名, ad-hoc)
          - os: macos-13
            label: macos-x64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --no-bundle"
          # macOS arm64 (Apple Silicon M1/M2/M3) — DMG (无签名, ad-hoc)
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --no-bundle"
          # Linux x64 — AppImage + deb
          - os: ubuntu-22.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        shell: bash
        run: npm ci

      - name: Setup Rust toolchain (stable + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ---- Linux: 装 WebKitGTK 系统依赖 ----
      - name: Install Linux dependencies (webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config build-essential

      # ---- macOS: 装 ARM64 target (如果是 Intel runner) ----
      - name: Add macOS ARM target
        if: runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin'
        run: rustup target add aarch64-apple-darwin

      - name: Add macOS x86 target
        if: runner.os == 'macOS' && matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      # ---- macOS: 导入 Apple Developer 证书到临时 keychain ----
      # 需在仓库 Settings → Secrets 配:
      #   APPLE_CERTIFICATE        base64 编码的 .p12 证书 (Developer ID Application)
      #   APPLE_CERTIFICATE_PASSWORD p12 的密码
      #   APPLE_SIGNING_IDENTITY    "Developer ID Application: Your Name (TEAMID)"
      #   APPLE_TEAM_ID             10 位 team id
      #   APPLE_ID / APPLE_PASSWORD App-specific password for notarization
      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE 未配置, 跳过代码签名 (产出会被 Gatekeeper 拦截)"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/ea.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s $KEYCHAIN_PATH

      # ---- 前端构建 ----
      - name: Build frontend
        shell: bash
        run: npm run build:renderer

      # ---- Tauri 构建 (产出安装包) ----
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 代码签名 (所有 secret 均可选, 未配时跳过对应签名步骤)
          # Tauri updater 签名: 配 TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) 后自动签 latest.json
          #   生成方式: npm run signer:gen
          #   公钥嵌入: src-tauri/tauri.conf.json 的 plugins.updater.pubkey
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: |
            Education Advisor 桌面端安装包 (Tauri 2.0 + Rust 后端 + React 前端)。

            详见:
            - [CHANGELOG.md](./CHANGELOG.md)
            - [MIGRATION_REPORT.md](./MIGRATION_REPORT.md)
            - [src-tauri/docs/CHANGELOG.md](./src-tauri/docs/CHANGELOG.md)
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          # Windows NSIS 比 MSI 体积小 + 安装体验好, latest.json 优先指向 NSIS
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # ---- 上传产物 (调试用, 正式发布会直接进 Release) ----
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*-*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*-*.dmg
            src-tauri/target/*/release/bundle/**/*.app.tar.gz
          retention-days: 14
          if-no-files-found: warn

  # ----------------------------------------------------------------
  # 生成 SHA256 校验 (三平台产物汇总)
  # ----------------------------------------------------------------
  checksum:
    name: Generate SHA256 checksums
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: tauri-*

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( \
              -name "*.exe" -o -name "*.msi" \
              -o -name "*.dmg" -o -name "*.app.tar.gz" \
              -o -name "*.AppImage" -o -name "*.deb" \
            \) ! -name "*.sig" \
            -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: artifacts/SHA256SUMS
