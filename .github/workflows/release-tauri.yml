# =============================================================
# 仓库 release workflow: Tauri 三平台构建
# (Windows / macOS / Linux)
#
# 触发: push v*.*.* tag → 构建三平台安装包 + 上传 GitHub Release
#       push main/master → 仅编译并上传 Actions Artifacts
# 手动: workflow_dispatch (调试用, 不发布)
#
# v0.2.0: 仓库已转正为 Tauri 单一架构, 此 workflow 即唯一 release 入口。
# =============================================================
name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # 三平台并行构建 Tauri 安装包
  # ----------------------------------------------------------------
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — MSI
          - os: windows-latest
            label: windows-x64
            bundles: "msi"
            extra_target: ""
            tauri_target: ""
          # macOS x64 (Intel) — 在 ARM 宿主编译 x86_64
          - os: macos-latest
            label: macos-x64
            bundles: "dmg"
            extra_target: x86_64-apple-darwin
            tauri_target: "--target x86_64-apple-darwin"
          # macOS arm64 (Apple Silicon) — 原生编译
          - os: macos-latest
            label: macos-arm64
            bundles: "dmg"
            extra_target: ""
            tauri_target: ""
          # Linux x64 — AppImage + deb
          - os: ubuntu-22.04
            label: linux-x64
            bundles: "deb,appimage"
            extra_target: ""
            tauri_target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        shell: bash
        run: npm ci

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ---- Windows: 设置 MSVC 编译环境 ----
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---- macOS: 安装交叉编译 target ----
      - name: Install extra Rust target (macOS)
        if: runner.os == 'macOS' && matrix.extra_target != ''
        run: rustup target add ${{ matrix.extra_target }}

      # ---- Linux: 装 WebKitGTK 系统依赖 ----
      - name: Install Linux dependencies (webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config build-essential

      # ---- 前端构建 ----
      - name: Build frontend
        shell: bash
        run: npm run build:renderer

      # ---- Tauri 构建 + 打包 ----
      - name: Build Tauri app
        shell: bash
        run: |
          cd src-tauri
          
          echo '::group::cargo build output'
          cargo build --release ${{ matrix.tauri_target }} > ${{ runner.temp }}/cargo_out.txt 2>&1
          CARGO_EXIT=$?
          cat ${{ runner.temp }}/cargo_out.txt
          if [ $CARGO_EXIT -ne 0 ]; then
            exit $CARGO_EXIT
          fi
          echo '::endgroup::'
          
          echo '::group::tauri build'
          npx tauri build --bundles ${{ matrix.bundles }} ${{ matrix.tauri_target }} --ci --verbose 2>&1
          echo '::endgroup::'
        env:
          RUST_BACKTRACE: "full"
          CARGO_TERM_COLOR: "always"

      # ---- 上传 cargo 构建日志 (用于诊断编译错误) ----
      - name: Upload cargo build log
        if: always() && matrix.label == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-out-${{ matrix.label }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/cargo_out.txt
          retention-days: 7

      # ---- 上传产物 ----
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.tar.gz
          retention-days: 14
          if-no-files-found: warn

  # ----------------------------------------------------------------
  # 发布到 GitHub Release (仅 tag 触发)
  # ----------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tauri-*

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( \
              -name "*.exe" -o -name "*.msi" \
              -o -name "*.dmg" -o -name "*.tar.gz" \
              -o -name "*.AppImage" -o -name "*.deb" \
              -o -name "*.app" \
            \) ! -name "*.sig" \
            -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Education Advisor 桌面端安装包 (Tauri 2.0 + Rust 后端 + React 前端)。

            ### 安装说明
            - **Linux**: 下载 `.deb` 双击安装, 或 `.AppImage` 直接运行
            - **Windows**: 下载 `.exe` (NSIS) 或 `.msi` 安装
            - **macOS**: 下载 `.dmg` 拖入 Applications
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            artifacts/SHA256SUMS
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
