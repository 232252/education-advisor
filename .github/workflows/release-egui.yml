name: Release egui

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ''
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: education-advisor-egui -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxext-dev libxrandr-dev \
            libgl1-mesa-dev libasound2-dev libudev-dev \
            libappindicator3-dev libgtk-3-dev

      - name: Build release binary
        working-directory: education-advisor-egui
        run: cargo build --release --locked --target ${{ matrix.target }} --features tray

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION=$(grep '^version' education-advisor-egui/Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          NAME=education-advisor-egui-v${VERSION}-${{ matrix.target }}
          mkdir -p dist/$NAME
          cp education-advisor-egui/target/${{ matrix.target }}/release/education-advisor-egui${{ matrix.ext }} dist/$NAME/
          cp education-advisor-egui/README.md dist/$NAME/ 2>/dev/null || true
          cp LICENSE dist/$NAME/ 2>/dev/null || true
          cd dist
          tar czf $NAME.${{ matrix.archive }} $NAME
          echo "ASSET=$NAME.${{ matrix.archive }}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrEmpty($version)) {
            $version = (Select-String -Path education-advisor-egui/Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          }
          $name = "education-advisor-egui-v$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "education-advisor-egui/target/${{ matrix.target }}/release/education-advisor-egui${{ matrix.ext }}" "dist/$name/"
          Copy-Item "education-advisor-egui/README.md" "dist/$name/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "dist/$name/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.${{ matrix.archive }}"
          "ASSET=$name.${{ matrix.archive }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: dist/${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
