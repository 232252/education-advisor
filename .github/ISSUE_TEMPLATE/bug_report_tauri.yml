name: 🐛 Bug 报告 (Tauri 版)
description: Tauri 桌面端 (src-tauri/) 的 Bug 报告
labels: ["bug", "tauri"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug! 请尽量填写完整, 帮助我们快速定位。
        如果是 Electron 版的 Bug, 请用 "🐛 Bug 报告" 模板。

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Linux (x86_64)
        - Windows (x86_64)
        - macOS (Intel x86_64)
        - macOS (Apple Silicon ARM64)
        - 其他
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust 版本 (rustc --version)
      placeholder: "rustc 1.95.0"
    validations:
      required: true

  - type: dropdown
    id: build-mode
    attributes:
      label: 构建方式
      options:
        - npm run tauri:dev (开发模式)
        - npm run tauri:build (发布构建)
        - 从 GitHub Release 下载安装包
        - 其他
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 描述 Bug
      description: 发生了什么? 预期应该发生什么?
      placeholder: |
        我做了 X, 期望 Y, 但发生了 Z。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 最小可复现的步骤
      placeholder: |
        1. 启动应用 npm run tauri:dev
        2. 进入 Dashboard 页面
        3. 点击 ...
        4. 看到 ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误输出
      description: 终端日志或 Rust panic 信息 (用 ``` 包裹)
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 Issue, 确认没有重复报告
          required: true
        - label: 我使用的是最新版本的 main 分支
          required: true
