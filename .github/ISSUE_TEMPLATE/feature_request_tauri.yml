name: ✨ 功能请求 (Tauri 版)
description: 为 Tauri 桌面端 (src-tauri/) 建议新功能或改进
labels: ["enhancement", "tauri"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议! 请描述清楚你想要的功能, 以及它解决的问题。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - 🧠 Agent 系统 (新增 Agent / 工具 / 调度)
        - 🤖 LLM 编排 (新 Provider / 流式 / 工具调用)
        - 🔒 隐私 / 合规 (脱敏 / 审计 / 报告)
        - 📊 数据引擎 (EAA / 操行分 / 事件)
        - 🖥️ 跨平台 (UI / WebView / 系统集成)
        - ⚡ 性能 (缓存 / 异步 / 内存)
        - 🔌 集成 (飞书 / OAuth / 第三方)
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 它解决什么问题?
      description: 当前有什么不方便 / 痛点?
      placeholder: |
        比如: 我想批量导入学生成绩, 但目前只能逐个手动录入。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 描述你心目中的理想实现
      placeholder: |
        1. Students 页面加一个 "导入 CSV" 按钮
        2. 解析 CSV, 批量调 bulk_add_academics 工具
        3. 导入后显示成功/失败统计
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有其他方式解决同样的问题? 为什么不选它们?

  - type: checkboxes
    id: willing
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意为这个功能提交 PR
          required: false
        - label: 我愿意协助测试这个功能
          required: false
