appId: com.education-advisor.app
productName: Education Advisor
copyright: Copyright 2026

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - node_modules/**/*

extraResources:
  - from: resources/eaa-binaries/
    to: eaa-binaries/
    filter: ["**/*"]
  - from: config/
    to: config/
    filter: ["**/*"]
  - from: agents/
    to: agents/
    filter: ["**/*"]

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
  # artifactName is set per target below to avoid name collisions.
  artifactName: "Education.Advisor-${version}-${arch}.${ext}"

nsis:
  artifactName: "Education.Advisor-${version}-Setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: "Education.Advisor-${version}-portable.${ext}"

asar: true
asarUnpack:
  - "**/*.exe"
  - "**/*.node"
  - "**/*.dll"
