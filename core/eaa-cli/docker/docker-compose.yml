version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eaa
      POSTGRES_USER: eaa
      POSTGRES_PASSWORD: ${EAA_DB_PASSWORD:-eaa_local_dev}
    volumes:
      - eaa-pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  eaa-pgdata:
