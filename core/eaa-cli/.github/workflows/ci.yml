name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["filesystem", "postgres"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (${{ matrix.features }})
        run: cargo build --release --no-default-features --features ${{ matrix.features }}
      - name: Run tests
        run: cargo test --no-default-features --features ${{ matrix.features }}
      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.features }} -- -D warnings

  integration:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eaa_test
          POSTGRES_USER: eaa
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run migrations
        run: psql postgres://eaa:test_password@localhost:5432/eaa_test -f migrations/001_init.sql
      - name: Test PostgreSQL backend
        run: EAA_BACKEND=postgres DATABASE_URL=postgres://eaa:test_password@localhost:5432/eaa_test cargo test --features postgres
